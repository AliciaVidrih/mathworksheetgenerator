<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worksheet Generator Menu</title>
    <style>
        :root { --accent-color: #2c3e50; --bg-color: #f0f2f5; --primary-green: #27ae60; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { color: var(--accent-color); margin-bottom: 40px; }
        .menu-container { display: flex; gap: 20px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-decoration: none; color: var(--accent-color); font-weight: bold; font-size: 1.2em; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); border-color: var(--primary-green); }
    </style>
</head>
<body>

    <h1>Math Worksheet Generator</h1>
    
    <div class="menu-container">
        <!-- Save your addition code as "addition.html" -->
        <a href="addition.html" class="card">Addition Generator</a>
        
        <!-- Save the subtraction code as "subtraction.html" -->
        <a href="subtraction.html" class="card">Subtraction Generator</a>
    </div>

</body>
</html>
